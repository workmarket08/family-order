    * { box-sizing: border-box; }
    :root{
      --pink:#d7a3b4; --accent:#c98ba0; --accent-d:#b9758d;
      --ink:#272727; --muted:#8c8c8c; --line:#e7e7e7; --panel:#f6f5f5;
      --charcoal:#343434; --danger:#c0392b;
    }
    html,body,#root{ margin:0; height:100%; }
    .app{ font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",-apple-system,"Segoe UI",sans-serif;
      color:var(--ink); background:#fff; min-height:100%; line-height:1.55; }
    h1,h2,h3{ margin:0; font-weight:600; }
    button{ font-family:inherit; cursor:pointer; }
    .boot{ min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center;
      gap:8px; font-family:-apple-system,"Segoe UI",sans-serif; }
    .boot-mark{ font-size:26px; letter-spacing:.4em; font-weight:300; }
    .boot-sub{ color:var(--muted); font-size:13px; }
    .connbar{ background:#fbeaea; color:#a23b30; text-align:center; font-size:13px; padding:9px; }

    .hdr{ border-bottom:1px solid var(--line); }
    .banner{ background:var(--pink); color:#fff; text-align:center; font-size:13px; padding:8px; letter-spacing:.04em; }
    .hdr-row{ max-width:1120px; margin:0 auto; display:flex; align-items:center; justify-content:space-between; padding:18px; gap:16px; }
    .logo{ background:none; border:none; font-size:26px; font-weight:300; letter-spacing:.32em; color:var(--ink); padding:0; }
    .logo span{ font-weight:600; letter-spacing:.32em; }
    .logo:disabled{ cursor:default; }
    .hdr-tools{ display:flex; align-items:center; gap:14px; }
    .srch{ position:relative; }
    .srch input{ border:1px solid var(--line); border-radius:2px; padding:8px 30px 8px 12px; width:200px; font-size:13px; outline:none; background:#fbfafa; }
    .srch input:focus{ border-color:var(--accent); }
    .srch-i{ position:absolute; right:9px; top:7px; font-size:13px; opacity:.6; }
    .cart-ico{ position:relative; background:none; border:none; font-size:22px; padding:4px; }
    .cart-ico em{ position:absolute; top:-2px; right:-4px; background:var(--accent); color:#fff; font-style:normal; font-size:11px; min-width:17px; height:17px; border-radius:9px; padding:0 4px; display:flex; align-items:center; justify-content:center; }

    .nav{ border-bottom:1px solid var(--line); background:#fff; position:sticky; top:0; z-index:20; }
    .nav-inner{ max-width:1120px; margin:0 auto; padding:0 12px; display:flex; align-items:center; justify-content:space-between; gap:10px; flex-wrap:wrap; }
    .nav-links{ display:flex; gap:2px; overflow-x:auto; }
    .navbtn{ background:none; border:none; padding:13px 14px; font-size:13.5px; color:#555; white-space:nowrap; border-bottom:2px solid transparent; }
    .navbtn.on{ color:var(--ink); border-bottom-color:var(--accent); font-weight:600; }
    .nav-user{ display:flex; align-items:center; gap:12px; font-size:12.5px; color:var(--muted); padding:6px 0; }
    .whoami{ color:var(--ink); font-weight:600; }
    .reload{ background:none; border:1px solid var(--line); border-radius:14px; padding:4px 10px; font-size:12px; color:#555; }
    .reload:hover{ border-color:var(--accent); color:var(--accent-d); }
    .link-btn{ background:none; border:none; color:var(--accent-d); padding:0; font-size:inherit; text-decoration:underline; }
    .link-btn.danger{ color:var(--danger); }
    .link-btn.center{ display:block; margin:6px auto 0; }

    .main{ max-width:1120px; margin:0 auto; padding:22px 16px 40px; }
    .layout{ display:grid; grid-template-columns:208px 1fr; gap:26px; }
    .side-block{ margin-bottom:20px; }
    .side-h{ font-weight:600; font-size:14px; border-bottom:2px solid var(--ink); padding-bottom:8px; margin-bottom:6px; }
    .side-i{ display:flex; align-items:center; justify-content:space-between; gap:6px; width:100%; background:none; border:none; border-bottom:1px solid var(--line); padding:11px 4px; text-align:left; font-size:13.5px; color:#3a3a3a; }
    .side-i:hover{ color:var(--accent-d); }
    .side-i.on{ color:var(--accent-d); font-weight:600; }
    .side-n{ color:var(--muted); font-size:12px; }
    .side-req{ color:var(--accent-d); }

    .crumb{ font-size:12px; color:var(--muted); margin-bottom:14px; }
    .page-h{ display:flex; align-items:baseline; gap:12px; border-bottom:1px solid var(--line); padding-bottom:12px; margin-bottom:18px; }
    .page-h h1{ font-size:22px; letter-spacing:.02em; }
    .cnt{ color:var(--muted); font-size:13px; }
    .lead{ color:#555; font-size:13.5px; margin:-6px 0 14px; }

    .grid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(168px,1fr)); gap:20px 16px; }
    .grid.mt16{ margin-top:16px; }
    .card{ display:flex; flex-direction:column; }
    .card-img{ position:relative; border:1px solid var(--line); background:#faf9f9; padding:0; aspect-ratio:1/1; overflow:hidden; }
    .card-img.static{ cursor:default; }
    .pimg{ width:100%; height:100%; object-fit:cover; display:block; }
    .pimg-card{ aspect-ratio:1/1; }
    .pimg-ph{ display:flex; align-items:center; justify-content:center; background:#f3f0f1; }
