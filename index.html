    * { box-sizing: border-box; }
    :root{ --pink:#d7a3b4; --accent:#c98ba0; --accent-d:#b9758d; --ink:#272727; --muted:#8c8c8c; --line:#e7e7e7; --panel:#f6f5f5; --charcoal:#343434; --danger:#c0392b; }
    html,body,#root{ margin:0; height:100%; }
    .app{ font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",-apple-system,"Segoe UI",sans-serif; color:var(--ink); background:#fff; min-height:100%; line-height:1.55; }
    h1,h2,h3{ margin:0; font-weight:600; }
    button{ font-family:inherit; cursor:pointer; }
    a.ext{ color:var(--accent-d); text-decoration:underline; }
    .boot{ min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:8px; font-family:-apple-system,"Segoe UI",sans-serif; }
    .boot-mark{ font-size:26px; letter-spacing:.4em; font-weight:300; }
    .boot-sub{ color:var(--muted); font-size:13px; }
    .connbar{ background:#fbeaea; color:#a23b30; text-align:center; font-size:13px; padding:9px; }

    .hdr{ border-bottom:1px solid var(--line); }
    .banner{ background:var(--pink); color:#fff; text-align:center; font-size:13px; padding:8px; letter-spacing:.04em; }
    .hdr-row{ max-width:1120px; margin:0 auto; display:flex; align-items:center; justify-content:space-between; padding:18px; gap:16px; }
    .logo{ background:none; border:none; font-size:26px; font-weight:300; letter-spacing:.32em; color:var(--ink); padding:0; }
    .logo span{ font-weight:600; letter-spacing:.32em; }
    .logo:disabled{ cursor:default; }
    .hdr-tools{ display:flex; align-items:center; gap:14px; }
    .srch{ position:relative; }
    .srch input{ border:1px solid var(--line); border-radius:2px; padding:8px 30px 8px 12px; width:200px; font-size:13px; outline:none; background:#fbfafa; }
    .srch input:focus{ border-color:var(--accent); }
    .srch-i{ position:absolute; right:9px; top:7px; font-size:13px; opacity:.6; }
    .cart-ico{ position:relative; background:none; border:none; font-size:22px; padding:4px; }
    .cart-ico em{ position:absolute; top:-2px; right:-4px; background:var(--accent); color:#fff; font-style:normal; font-size:11px; min-width:17px; height:17px; border-radius:9px; padding:0 4px; display:flex; align-items:center; justify-content:center; }

    .nav{ border-bottom:1px solid var(--line); background:#fff; position:sticky; top:0; z-index:20; }
    .nav-inner{ max-width:1120px; margin:0 auto; padding:0 12px; display:flex; align-items:center; justify-content:space-between; gap:10px; flex-wrap:wrap; }
    .nav-links{ display:flex; gap:2px; overflow-x:auto; }
    .navbtn{ background:none; border:none; padding:13px 14px; font-size:13.5px; color:#555; white-space:nowrap; border-bottom:2px solid transparent; }
    .navbtn.on{ color:var(--ink); border-bottom-color:var(--accent); font-weight:600; }
    .nav-user{ display:flex; align-items:center; gap:12px; font-size:12.5px; color:var(--muted); padding:6px 0; }
    .whoami{ color:var(--ink); font-weight:600; }
    .reload{ background:none; border:1px solid var(--line); border-radius:14px; padding:4px 10px; font-size:12px; color:#555; }
    .reload:hover{ border-color:var(--accent); color:var(--accent-d); }
    .link-btn{ background:none; border:none; color:var(--accent-d); padding:0; font-size:inherit; text-decoration:underline; }
    .link-btn.danger{ color:var(--danger); }
    .link-btn.center{ display:block; margin:6px auto 0; }

    .main{ max-width:1120px; margin:0 auto; padding:22px 16px 40px; }
    .layout{ display:grid; grid-template-columns:208px 1fr; gap:26px; }
    .side-block{ margin-bottom:20px; }
    .side-h{ font-weight:600; font-size:14px; border-bottom:2px solid var(--ink); padding-bottom:8px; margin-bottom:6px; }
    .side-i{ display:flex; align-items:center; justify-content:space-between; gap:6px; width:100%; background:none; border:none; border-bottom:1px solid var(--line); padding:11px 4px; text-align:left; font-size:13.5px; color:#3a3a3a; }
    .side-i:hover{ color:var(--accent-d); }
    .side-i.on{ color:var(--accent-d); font-weight:600; }
    .side-n{ color:var(--muted); font-size:12px; }
    .side-req{ color:var(--accent-d); }

    .crumb{ font-size:12px; color:var(--muted); margin-bottom:14px; }
    .page-h{ display:flex; align-items:baseline; gap:12px; border-bottom:1px solid var(--line); padding-bottom:12px; margin-bottom:18px; }
    .page-h h1{ font-size:22px; letter-spacing:.02em; }
    .cnt{ color:var(--muted); font-size:13px; }
    .lead{ color:#555; font-size:13.5px; margin:-6px 0 14px; }

    .grid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(168px,1fr)); gap:20px 16px; }
    .grid.mt16{ margin-top:16px; }
    .card{ display:flex; flex-direction:column; }
    .card-img{ position:relative; border:1px solid var(--line); background:#faf9f9; padding:0; aspect-ratio:1/1; overflow:hidden; }
    .card-img.static{ cursor:default; }
    .pimg{ width:100%; height:100%; object-fit:cover; display:block; }
    .pimg-card{ aspect-ratio:1/1; }
    .pimg-ph{ display:flex; align-items:center; justify-content:center; background:#f3f0f1; }
    .pimg-ph span{ font-size:40px; opacity:.85; }
    .ribbon{ position:absolute; top:8px; left:8px; background:var(--accent); color:#fff; font-size:11px; padding:2px 8px; border-radius:2px; }
    .card-b{ padding:10px 2px 0; display:flex; flex-direction:column; gap:5px; }
    .card-name{ background:none; border:none; text-align:left; padding:0; font-size:13px; color:var(--ink); line-height:1.4; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
    .card-name:hover{ color:var(--accent-d); }
    .card-cat{ font-size:11.5px; color:var(--muted); }
    .card-price{ font-size:15px; font-weight:700; }

    .btn{ border:none; border-radius:3px; padding:11px 18px; font-size:14px; font-weight:600; }
    .btn.full{ width:100%; }
    .btn.sm{ padding:8px 12px; font-size:12.5px; }
    .btn.xs{ padding:5px 9px; font-size:11.5px; border-radius:3px; }
    .btn.big{ padding:15px; font-size:15px; }
    .btn.mt8{ margin-top:8px; }
    .btn-accent{ background:var(--accent); color:#fff; }
    .btn-accent:hover{ background:var(--accent-d); }
    .btn-dark{ background:var(--charcoal); color:#fff; }
    .btn-dark:hover{ background:#1f1f1f; }
    .btn-ghost{ background:#fff; color:#444; border:1px solid #cfcfcf; }
    .btn-ghost:hover{ border-color:var(--accent); color:var(--accent-d); }
    .btn-danger{ background:#fff; color:var(--danger); border:1px solid #e3b7b2; }
    .btn-danger:hover{ background:#fbecea; }
    .btn:disabled{ opacity:.45; cursor:not-allowed; }

    .qty{ display:inline-flex; align-items:center; border:1px solid var(--line); border-radius:3px; }
    .qty button{ width:34px; height:34px; background:#fff; border:none; font-size:17px; color:#444; }
    .qty span{ min-width:38px; text-align:center; font-size:14px; }
    .qty-sm button{ width:28px; height:28px; font-size:15px; }
    .qty-sm span{ min-width:30px; }

    .detail-grid{ display:grid; grid-template-columns:1fr 1fr; gap:34px; margin-top:8px; }
    .detail-img{ border:1px solid var(--line); background:#faf9f9; aspect-ratio:1/1; overflow:hidden; }
    .pimg-detail{ aspect-ratio:1/1; }
    .tags{ display:flex; gap:8px; margin-bottom:12px; }
    .cat-pill{ background:#f1ecef; color:#7a5566; font-size:12px; padding:3px 10px; border-radius:2px; }
    .req-pill{ background:var(--accent); color:#fff; font-size:12px; padding:3px 10px; border-radius:2px; }
    .detail-info h1{ font-size:21px; line-height:1.4; }
    .detail-price{ font-size:28px; font-weight:700; margin:14px 0 20px; }
    .detail-price small{ font-size:14px; font-weight:400; color:var(--muted); }
    .detail-row{ display:flex; align-items:center; gap:18px; margin-bottom:18px; }
    .detail-row .lbl{ font-size:13px; color:#555; }
    .detail-extra{ margin-top:16px; }
    .owner-tools{ display:flex; gap:10px; margin-top:18px; padding-top:16px; border-top:1px solid var(--line); }
    .meta-line{ margin-top:6px; font-size:12.5px; color:#666; }
    .notes-box{ margin-top:8px; font-size:12.5px; color:#555; background:var(--panel); border-radius:4px; padding:8px 10px; white-space:pre-wrap; }

    .cart-title{ font-size:24px; border-bottom:1px solid var(--ink); padding-bottom:14px; margin-bottom:22px; }
    .cart-grid{ display:grid; grid-template-columns:1fr 340px; gap:28px; align-items:start; }
    .cart-item{ display:flex; gap:16px; padding:18px 0; border-bottom:1px solid var(--line); }
    .pimg-cart{ width:96px; height:96px; flex:none; border:1px solid var(--line); }
    .cart-mid{ flex:1; }
    .ci-name{ font-size:14.5px; font-weight:600; }
    .ci-cat{ font-size:12px; color:var(--muted); margin:2px 0 6px; }
    .ci-price{ font-size:13px; color:#444; }
    .ci-controls{ display:flex; align-items:center; gap:14px; margin:10px 0; }
    .ci-sub{ font-size:15px; font-weight:700; }
    .summary{ background:var(--panel); padding:22px; border-radius:4px; position:sticky; top:64px; }
    .sum-row{ display:flex; justify-content:space-between; align-items:center; font-size:14px; margin:8px 0; }
    .sum-row.big{ font-size:18px; font-weight:700; }
    .sum-row.big b{ font-size:22px; }
    .sum-line{ height:1px; background:#dcd9da; margin:14px 0; }
    .summary .btn{ margin-top:12px; }
    .sum-note{ font-size:11.5px; color:#777; margin-top:14px; line-height:1.6; }

    .single{ max-width:860px; }
    .my-total{ background:var(--panel); padding:14px 18px; border-radius:4px; font-size:15px; margin-bottom:20px; }
    .my-total b{ font-size:20px; }
    .my-total-note{ font-size:11.5px; color:var(--muted); margin-left:8px; }
    .ostack{ margin-bottom:24px; }
    .ostack-h{ display:flex; align-items:center; gap:12px; border-bottom:1px solid var(--line); padding-bottom:8px; margin-bottom:6px; }
    .ostack-sub{ font-size:12.5px; color:var(--muted); }
    .orow{ display:flex; align-items:flex-start; gap:14px; padding:12px 0; border-bottom:1px solid #f1f1f1; }
    .orow-mid{ flex:1; }

    .stag{ font-size:11.5px; padding:3px 10px; border-radius:12px; font-weight:600; white-space:nowrap; }
    .st-gray{ background:#eee; color:#666; } .st-blue{ background:#e4eef7; color:#3771a6; }
    .st-amber{ background:#fbeed2; color:#9a6a16; } .st-green{ background:#e0f1e4; color:#3a8048; }

    .admin-actions{ display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:24px; }
    .aa-card{ border:1px solid var(--line); border-radius:6px; padding:16px; }
    .aa-h{ font-weight:700; margin-bottom:6px; }
    .aa-card p{ font-size:12.5px; color:#666; margin:0 0 12px; }
    .tabs{ display:flex; gap:4px; border-bottom:1px solid var(--line); margin-bottom:16px; }
    .tab{ background:none; border:none; padding:10px 16px; font-size:14px; color:#666; border-bottom:2px solid transparent; }
    .tab.on{ color:var(--ink); font-weight:600; border-bottom-color:var(--accent); }
    .tablewrap{ overflow-x:auto; }
    .tbl{ width:100%; border-collapse:collapse; font-size:13px; }
    .tbl th,.tbl td{ border-bottom:1px solid var(--line); padding:10px 8px; text-align:center; vertical-align:top; }
    .tbl th{ background:#faf9f9; font-weight:600; font-size:12.5px; color:#555; }
    .tbl .tl{ text-align:left; }
    .tbl .strong{ font-weight:700; }
    .tbl .grand{ font-weight:700; font-size:16px; color:var(--accent-d); }
    .tbl tfoot td{ background:#faf9f9; }
    .tbl .sub{ font-size:11px; color:var(--muted); margin-top:3px; }
    .tbl-note{ font-size:11.5px; color:var(--muted); margin-top:8px; }
    .ops{ display:flex; gap:6px; justify-content:center; }
    .sub-h{ font-size:15px; margin:24px 0 10px; }
    .cat-actions{ margin-bottom:8px; }
    .dash{ color:#ccc; }
    .assign{ margin-top:8px; }
    .assign select, .tbl select{ width:100%; padding:6px; font-size:12px; border:1px solid var(--line); border-radius:3px; background:#fff; }

    .empty{ text-align:center; padding:48px 16px; color:#777; border:1px dashed var(--line); border-radius:6px; }
    .empty p{ margin:0 0 16px; }

    .gate{ max-width:420px; margin:48px auto; text-align:center; padding:0 16px; }
    .gate h2{ font-size:22px; margin-bottom:8px; }
    .gate-sub{ color:#666; font-size:13.5px; margin-bottom:24px; }
    .login-card{ text-align:left; border:1px solid var(--line); border-radius:10px; padding:24px; box-shadow:0 4px 18px rgba(0,0,0,.04); }
    .login-card .btn{ margin-top:8px; }

    .modal-wrap{ position:fixed; inset:0; background:rgba(0,0,0,.4); display:flex; align-items:center; justify-content:center; z-index:60; padding:16px; }
    .modal{ background:#fff; border-radius:8px; width:100%; max-width:440px; max-height:90vh; overflow:auto; box-shadow:0 18px 50px rgba(0,0,0,.25); }
    .modal-head{ display:flex; align-items:center; justify-content:space-between; padding:16px 18px; border-bottom:1px solid var(--line); }
    .modal-head h3{ font-size:16px; }
    .modal-head .x{ background:none; border:none; font-size:22px; color:#888; line-height:1; }
    .modal-body{ padding:18px; }
    .modal-foot{ display:flex; justify-content:flex-end; gap:10px; padding:14px 18px; border-top:1px solid var(--line); }
    .fld{ display:block; margin-bottom:14px; }
    .fld span{ display:block; font-size:12.5px; color:#555; margin-bottom:6px; font-weight:600; }
    .fld input,.fld select,.fld textarea{ width:100%; padding:10px 12px; border:1px solid var(--line); border-radius:4px; font-size:14px; outline:none; background:#fff; font-family:inherit; }
    .fld textarea{ resize:vertical; }
    .fld input:focus,.fld select:focus,.fld textarea:focus{ border-color:var(--accent); }
    .hint{ display:block; color:var(--muted); font-size:11px; margin-top:6px; line-height:1.5; }
    .note{ background:#f7f1f4; border-radius:6px; padding:10px 12px; font-size:12px; color:#7a5566; margin:0 0 4px; line-height:1.6; }
    .preview{ margin-bottom:14px; }
    .preview .pimg{ width:90px; height:90px; border:1px solid var(--line); border-radius:4px; }
    .err{ color:var(--danger); font-size:12.5px; margin:4px 0 10px; }

    .toast{ position:fixed; bottom:24px; left:50%; transform:translateX(-50%); background:#2c2c2c; color:#fff; padding:12px 22px; border-radius:24px; font-size:13.5px; z-index:80; box-shadow:0 8px 24px rgba(0,0,0,.25); }
    .ftr{ text-align:center; font-size:11.5px; color:var(--muted); padding:24px 16px 36px; border-top:1px solid var(--line); }

    @media (max-width:780px){
      .hdr-row{ flex-wrap:wrap; gap:10px; padding:14px; }
      .logo{ font-size:21px; }
      .srch input{ width:150px; }
